<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Calculator app</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="calculator-container">
    <main class="calculator">
      <header class="calculator__header">
        <h1 class="calculator__logo">calc</h1>
        <div class="theme-switch">
          <span class="theme-switch__title">THEME</span>
          <fieldset class="theme-switch__fieldset">
            <legend class="sr-only">Choose theme</legend>

            <div class="theme-switch__labels">
              <label for="theme-1" class="theme-switch__label-num">1</label>
              <label for="theme-2" class="theme-switch__label-num">2</label>
              <label for="theme-3" class="theme-switch__label-num">3</label>
            </div>

            <div class="theme-switch__track">
              <input type="radio" id="theme-1" name="theme" value="1" checked>
              <input type="radio" id="theme-2" name="theme" value="2">
              <input type="radio" id="theme-3" name="theme" value="3">

              <div class="theme-switch__knob" aria-hidden="true"></div>
            </div>
          </fieldset>
        </div>
      </header>

      <section class="calculator__screen" aria-label="Calculator screen">
        <output id="screen">0</output>
      </section>

      <section class="calculator__buttons" aria-label="Calculator keypad">
        <button class="calculator__button calculator__button--number">7</button>
        <button class="calculator__button calculator__button--number">8</button>
        <button class="calculator__button calculator__button--number">9</button>
        <button class="calculator__button calculator__button--delete">DEL</button>
        <button class="calculator__button calculator__button--number">4</button>
        <button class="calculator__button calculator__button--number">5</button>
        <button class="calculator__button calculator__button--number">6</button>
        <button class="calculator__button calculator__button--operator" aria-label="plus">+</button>
        <button class="calculator__button calculator__button--number">1</button>
        <button class="calculator__button calculator__button--number">2</button>
        <button class="calculator__button calculator__button--number">3</button>
        <button class="calculator__button calculator__button--operator" aria-label="minus">-</button>
        <button class="calculator__button calculator__button--number">.</button>
        <button class="calculator__button calculator__button--number">0</button>
        <button class="calculator__button calculator__button--operator" aria-label="divide">/</button>
        <button class="calculator__button calculator__button--operator" aria-label="multiply">x</button>
        <button class="calculator__button calculator__button--reset">RESET</button>
        <button class="calculator__button calculator__button--equals" aria-label="equals">=</button>
      </section>
    </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Soumya</a>.
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
